name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege by default; jobs opt into more only if they need it.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest
    # Job-level permissions replace the workflow-level block above rather than
    # merging with it, so contents: read must be repeated here alongside the
    # two extra scopes attest-build-provenance needs for keyless (OIDC) signing.
    permissions:
      contents: read
      id-token: write
      attestations: write
    # Build-time-only placeholders: `prisma generate` and `next build` need
    # these env vars to be *present and well-formed*, not to be live
    # credentials — no database or Clerk instance is actually contacted
    # during typecheck/lint/test/build. Real secrets are injected at deploy
    # time (Cloud Run env/Secret Manager bindings), never committed here.
    env:
      DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'
      DIRECT_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: 'pk_test_placeholder'
      CLERK_SECRET_KEY: 'sk_test_placeholder'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test -- --coverage
      - name: Build
        run: npm run build
      - name: Package deployable build output
        # attest-build-provenance caps at 1024 subjects, and `.next/**` is far
        # more than that (the traced node_modules under .next/standalone alone).
        # Attest a single tarball of exactly what the Dockerfile ships instead:
        # one meaningful subject that also scales as the app grows.
        if: github.event_name == 'push'
        run: |
          paths=".next/standalone .next/static"
          if [ -d public ]; then paths="$paths public"; fi
          tar -czf next-standalone.tar.gz $paths
      - name: Attest build provenance
        # Only on push to main: a signed provenance record is only meaningful
        # for the artefact that actually ships. PR runs (fork or not) also
        # can't reliably obtain the OIDC token this step needs.
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: 'next-standalone.tar.gz'
      - name: Upload deployable build output
        if: github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: next-standalone
          path: next-standalone.tar.gz
          retention-days: 14
      - name: Dependency audit
        run: npm audit --audit-level=high
      - name: Verify package signatures
        run: npm audit signatures
      - name: Check guardrail manifest drift
        run: node .github/scripts/check-manifest-drift.mjs
      - name: Audit hook self-test
        run: node .cursor/hooks/audit.mjs --self-test

  e2e-gate:
    name: E2E gate (Clerk test secret present?)
    runs-on: ubuntu-latest
    # The `secrets` context is not allowed in a job-level `if`, so this tiny
    # gate job maps the secret into an env var, checks it, and exposes the
    # result as an output the e2e job keys its `if` on. A missing secret must
    # never fail CI — it only skips the e2e job.
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        run: |
          if [ -n "$CLERK_SECRET_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: e2e-gate
    # Skips cleanly until real Clerk *test* keys are added as repo secrets
    # (see docs/environment-setup.md).
    if: ${{ needs.e2e-gate.outputs.enabled == 'true' }}
    env:
      DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'
      DIRECT_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      E2E_CLERK_USER_EMAIL: ${{ secrets.E2E_CLERK_USER_EMAIL }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
      - name: Run e2e tests
        run: npm run test:e2e
        env:
          CI: 'true'
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Generate SBOM
        # --package-lock-only reads package-lock.json directly instead of
        # walking node_modules via `npm ls`. --ignore-npm-errors tolerates the
        # pre-existing eslint-plugin-jsx-a11y / eslint@10 peer-dependency
        # mismatch documented in 40-tooling-supply-chain.mdc (npm ls flags it
        # as "invalid" from the lockfile's own peer-dependency metadata, not
        # from node_modules — the mismatch is real but already a known,
        # accepted risk, not something this job should fail on).
        run: npx @cyclonedx/cyclonedx-npm@5.0.0 --package-lock-only --ignore-npm-errors --output-format JSON --output-file sbom.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: gitleaks
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            detect --source=/repo --redact --no-banner --exit-code 1

  sast:
    name: SAST (Semgrep OWASP Top Ten)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.168.0@sha256:59fbed6127ea7c5dde3ba6a85142733bb20ea9aaa36120c953904f1539aaf66e
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: semgrep scan
        run: semgrep scan --config p/owasp-top-ten --error --quiet
