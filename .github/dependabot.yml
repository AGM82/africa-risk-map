version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    # Keep the inbox quiet: at most a handful of grouped PRs open at once.
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Batch routine dev-dependency bumps into a single PR to cut noise.
      dev-dependencies:
        dependency-type: development
      # Keep react and react-dom in sync — they must always be the same version.
      react-runtime:
        patterns:
          - "react"
          - "react-dom"
      # Foundational UI stack — bump as a unit so Tailwind, shadcn, and Radix stay compatible.
      frontend-stack:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/vite"
          - "tw-animate-css"
          - "shadcn"
          - "@base-ui/react"
          - "lucide-react"
          - "class-variance-authority"
          - "clsx"
          - "tailwind-merge"
          - "prettier-plugin-tailwindcss"
          - "@fontsource-variable/*"
      # Sweep every remaining production dependency (Sentry, Inngest, Clerk,
      # Next, etc.) into one PR so runtime bumps don't each open their own.
      production-dependencies:
        dependency-type: production
        patterns:
          - "*"
    ignore:
      # ESLint major versions frequently break plugins (e.g. eslint-plugin-jsx-a11y
      # caps at eslint@^9). Require an explicit compatibility check before merging.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript-eslint"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci(deps)"
    groups:
      # One PR for all action bumps rather than one per action.
      github-actions:
        patterns:
          - "*"
